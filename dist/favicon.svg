<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2d6b"/>
      <stop offset="100%" style="stop-color:#1a4db3"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="48" fill="url(#goldGrad)"/>

  <!-- Inner blue circle -->
  <circle cx="50" cy="50" r="43" fill="url(#bgGrad)"/>

  <!-- Thin gold inner ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#f5c842" stroke-width="0.8"/>

  <!-- Open Book (center) -->
  <g transform="translate(50,56)">
    <!-- Left page -->
    <path d="M0,-10 C-4,-11 -12,-11 -16,-9 L-16,6 C-12,4 -4,4 0,5 Z"
          fill="rgba(255,255,255,0.12)" stroke="#f5c842" stroke-width="1"/>
    <!-- Right page -->
    <path d="M0,-10 C4,-11 12,-11 16,-9 L16,6 C12,4 4,4 0,5 Z"
          fill="rgba(255,255,255,0.12)" stroke="#f5c842" stroke-width="1"/>
    <!-- Spine line -->
    <line x1="0" y1="-10" x2="0" y2="5" stroke="#f5c842" stroke-width="1.2"/>
    <!-- Book base -->
    <path d="M-16,6 Q0,9 16,6" fill="none" stroke="#f5c842" stroke-width="1"/>
  </g>

  <!-- Crescent moon (top) -->
  <path d="M50,14 A14,14 0 1,1 50,14.01
           M50,14 A10,10 0 1,0 50,14.01"
        fill="none"/>
  <path d="M43,18 A10,10 0 0,1 57,18 A13,13 0 0,0 43,18 Z"
        fill="#f5c842"/>
  <!-- Better crescent -->
  <path d="M38,22 Q50,10 62,22 Q55,15 50,15 Q45,15 38,22 Z" fill="#f5c842"/>
  <circle cx="55" cy="16" r="7" fill="url(#bgGrad)"/>

  <!-- 5-pointed star next to crescent -->
  <polygon points="50,11 51.2,14.6 55,14.6 52,16.8 53.2,20.4 50,18.2 46.8,20.4 48,16.8 45,14.6 48.8,14.6"
           fill="#f5c842" transform="translate(-8,-2) scale(0.85)"/>

  <!-- Arabic letter ا (Alef) subtle watermark -->
  <text x="50" y="52" font-family="serif" font-size="11" font-weight="bold"
        fill="rgba(245,200,66,0.25)" text-anchor="middle">ابن خلدون</text>

  <!-- Decorative dots at cardinal points -->
  <circle cx="50" cy="8" r="1.5" fill="#f5c842"/>
  <circle cx="92" cy="50" r="1.5" fill="#f5c842"/>
  <circle cx="50" cy="92" r="1.5" fill="#f5c842"/>
  <circle cx="8" cy="50" r="1.5" fill="#f5c842"/>
</svg>
