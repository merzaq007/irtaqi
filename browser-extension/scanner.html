<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Moodle Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 500px; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; }
    h2 { color: #3b82f6; margin-bottom: 12px; font-size: 16px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; margin-bottom: 8px; }
    .btn-blue { background: #3b82f6; color: white; }
    .btn-green { background: #10b981; color: white; }
    .status { font-size: 12px; color: #94a3b8; margin: 8px 0; min-height: 20px; }
    .result { background: #1e293b; border-radius: 8px; padding: 10px; font-size: 11px; direction: ltr; max-height: 350px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 8px; }
    .progress { font-size: 11px; color: #f59e0b; margin: 4px 0; }
  </style>
</head>
<body>
  <h2>🔍 Moodle 3-Level Scanner</h2>
  <p style="font-size:11px; color:#64748b; margin-bottom:12px;">
    يجلب تلقائياً: السداسي → المقاييس → course IDs
  </p>
  <button class="btn btn-blue" id="scanBtn">🚀 ابدأ المسح التلقائي</button>
  <div class="status" id="status">جاهز للمسح...</div>
  <div class="progress" id="progress"></div>
  <div class="result" id="result" style="display:none;"></div>
  <button class="btn btn-green" id="copyBtn" style="display:none; margin-top:8px;">📋 نسخ النتائج</button>
  <script src="scanner.js"></script>
</body>
</html>
