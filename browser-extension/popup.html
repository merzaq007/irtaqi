<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Irtaqi Downloader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; }

    .header { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 14px 18px; }
    .header h1 { font-size: 16px; font-weight: 800; }
    .header p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .tabs { display: flex; background: #1e293b; }
    .tab  { flex: 1; padding: 9px; text-align: center; font-size: 11px; font-weight: 600;
            cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section { padding: 12px 14px; border-bottom: 1px solid #1e293b; }
    .section-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }

    .course-info { background: #1e293b; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .course-name { font-weight: 700; color: #e2e8f0; font-size: 13px; margin-bottom: 3px; }
    .course-meta { color: #64748b; font-size: 11px; }

    .file-list { max-height: 180px; overflow-y: auto; margin-bottom: 10px; }
    .file-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px;
                 background: #1e293b; border-radius: 6px; margin-bottom: 4px; font-size: 11px; }
    .file-icon { font-size: 14px; flex-shrink: 0; }
    .file-name { flex: 1; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-type { color: #475569; font-size: 10px; flex-shrink: 0; }

    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: 700;
           font-size: 13px; cursor: pointer; transition: all 0.2s; margin-top: 6px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green { background: #10b981; color: white; }
    .btn-green:hover:not(:disabled) { background: #059669; }
    .btn-blue  { background: #3b82f6; color: white; }
    .btn-blue:hover:not(:disabled)  { background: #2563eb; }
    .btn-ghost { background: #1e293b; color: #94a3b8; }
    .btn-ghost:hover { background: #334155; }

    input { width: 100%; padding: 8px 10px; background: #1e293b; border: 1px solid #334155;
            border-radius: 7px; color: #e2e8f0; font-size: 12px; outline: none; margin-bottom: 6px; direction: ltr; }
    input:focus { border-color: #3b82f6; }
    label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 3px; }

    .status { text-align: center; font-size: 12px; padding: 8px; border-radius: 6px; margin-top: 8px; }
    .status.ok    { background: #064e3b; color: #6ee7b7; }
    .status.warn  { background: #451a03; color: #fcd34d; }
    .status.info  { background: #1e3a5f; color: #93c5fd; }
    .status.error { background: #450a0a; color: #fca5a5; }

    .progress-bar  { width: 100%; height: 4px; background: #1e293b; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); border-radius: 2px; transition: width 0.3s; }

    .tg-status { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .dot.on { background: #10b981; }

    .empty { text-align: center; color: #475569; font-size: 12px; padding: 20px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <h1>📥 Irtaqi Downloader</h1>
  <p>رفع دروس Moodle + إشعارات Telegram تلقائية</p>
</div>

<div class="tabs">
  <div class="tab active" data-tab="main">الرئيسية</div>
  <div class="tab" data-tab="settings">الإعدادات</div>
</div>

<!-- الرئيسية -->
<div class="tab-content active" id="tab-main">
  <div class="section">
    <div class="course-info">
      <div class="course-name" id="courseName">جاري التحقق...</div>
      <div class="course-meta" id="courseMeta"></div>
    </div>
    <div class="file-list" id="fileList">
      <div class="empty">افتح صفحة مقياس في Moodle</div>
    </div>
    <button class="btn btn-green" id="downloadBtn" disabled>📤 رفع ونشر على ارتقي</button>
    <button class="btn btn-ghost" id="openMoodleBtn">🌐 فتح Moodle</button>
    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="status" id="statusMsg" style="display:none;"></div>
  </div>
</div>

<!-- الإعدادات -->
<div class="tab-content" id="tab-settings">
  <div class="section">
    <div class="section-title">Supabase</div>
    <label>Anon Key</label>
    <input type="password" id="supabaseKey" placeholder="eyJhbGci...">
  </div>
  <div class="section">
    <div class="section-title">Telegram Bot</div>
    <div class="tg-status">
      <div class="dot" id="tgDot"></div>
      <span id="tgStatus">غير مفعّل</span>
    </div>
    <label>Bot Token</label>
    <input type="password" id="telegramToken" placeholder="123456:ABC-DEF...">
    <label>Chat ID</label>
    <input type="text" id="telegramChatId" placeholder="-100xxxxxxxxx">
    <button class="btn btn-blue" id="testTgBtn">🔔 اختبار الإشعار</button>
  </div>
  <div class="section">
    <button class="btn btn-green" id="saveSettingsBtn">💾 حفظ الإعدادات</button>
    <div class="status" id="settingsStatus" style="display:none;"></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
