<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- خلفية دائرية -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)"/>
  <!-- حلقة خارجية -->
  <circle cx="60" cy="60" r="55" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <!-- حلقة داخلية -->
  <circle cx="60" cy="60" r="48" stroke="#3b82f6" stroke-width="0.4" stroke-opacity="0.2" fill="none"/>

  <!-- سهم ارتقاء في الخلفية -->
  <path d="M60 22 L72 40 H65 V58 H55 V40 H48 Z" fill="url(#arrowGrad)" opacity="0.15"/>

  <!-- نجمة/بريق في الأعلى -->
  <g filter="url(#glow)" transform="translate(60,26)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fbbf24" stroke-width="1" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fbbf24" stroke-width="1" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#fbbf24"/>
  </g>

  <!-- كلمة ارتقِي بخط كبير -->
  <text
    x="60" y="72"
    font-family="'Tajawal','Cairo','Arial',sans-serif"
    font-size="28"
    font-weight="900"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="-1"
  >ارتقِي</text>

  <!-- خط تحت الكلمة -->
  <line x1="28" y1="80" x2="92" y2="80" stroke="url(#arrowGrad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- نقطتان زخرفيتان -->
  <circle cx="24" cy="80" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="96" cy="80" r="2" fill="#3b82f6" opacity="0.6"/>

  <!-- نص صغير في الأسفل -->
  <text
    x="60" y="96"
    font-family="'Tajawal','Cairo','Arial',sans-serif"
    font-size="7"
    font-weight="500"
    fill="#93c5fd"
    text-anchor="middle"
    opacity="0.7"
    letter-spacing="1"
  >IRTAQI</text>
</svg>
